name: Site quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 24
          cache: npm

      - name: Install quality dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint

      - name: Validate HTML
        run: npm run validate:html

      - name: Check site invariants
        run: npm run check:site

      - name: Run unit tests
        run: npm run test:unit

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: npm run test:e2e

      - name: Run Lighthouse budgets
        run: npm run test:lighthouse

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: site-quality-reports
          path: |
            playwright-report/
            test-results/
            artifacts/lighthouse/
          if-no-files-found: ignore
          retention-days: 7
